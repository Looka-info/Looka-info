name: Update Image Readme

on:
  workflow_dispatch:
  schedule:
    # Runs at 12 AM UTC everyday
    - cron: "0 */3 * * *"

jobs:
  update-readme:
    name: Update Image README
    runs-on: ubuntu-latest
    steps:
      - uses: siddharth2016/update-readme-image@main
        with:
          HEIGHT: 97%       # default
          WIDTH: 97%        # default
          ALIGN: center        # default
          IMG_ALT: generated_image #image alt to be displayed if image is not mapped correctly
